<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tiff</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            display: flex;
        }
        .sidebar {
            display: flex;
            flex-direction: column;
            background-color: #f1f1f1;
            padding: 0;
            margin: 0;
            min-height: 100vh;
            width: 120px;
            flex-shrink: 0;
        }
        .tab {
            padding: 14px 16px;
            cursor: pointer;
            background-color: #f1f1f1;
            border: none;
            outline: none;
            transition: 0.3s;
            text-decoration: none;
            color: #333;
        }
        .tab:hover {
            background-color: #ddd;
        }
        .tab.active {
            background-color: #ccc;
        }
        .content {
            padding: 20px;
            flex: 1;
            min-height: 100vh;
            box-sizing: border-box;
        }
        .home-content {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        img {
            max-width: 80%;
            height: auto;
        }
        p {
            margin-top: 20px;
            font-size: 24px;
            color: #333;
        }

        /* Tablet styles */
        @media (max-width: 768px) {
            body {
                flex-direction: column;
            }
            .sidebar {
                flex-direction: row;
                width: 100%;
                min-height: auto;
            }
            .tab {
                flex: 1;
                text-align: center;
            }
            .content {
                min-height: calc(100vh - 48px);
            }
            .home-content {
                min-height: calc(100vh - 48px);
            }
            img {
                max-width: 90%;
            }
            p {
                font-size: 20px;
            }
        }

        /* Mobile styles */
        @media (max-width: 480px) {
            .tab {
                padding: 12px 10px;
                font-size: 14px;
            }
            .content {
                padding: 15px;
            }
            img {
                max-width: 95%;
            }
            p {
                font-size: 18px;
            }
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <a href="index.html" class="tab active">Home</a>
        <a href="region.html" class="tab">Region</a>
    </div>

    <div class="content">
        <div class="home-content">
            <img src="cyndaquil.png" alt="Cyndaquil">
            <p>Work in progress</p>
        </div>
    </div>
</body>
</html>
